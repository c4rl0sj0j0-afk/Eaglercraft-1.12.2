[build]
  publish = "."
  command = ""

[build.environment]
  NODE_VERSION = "22"

# Allow the large embedded game HTML and zip downloads to load without
# restrictive CORS/CSP getting in the way.
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "no-referrer-when-downgrade"

[[headers]]
  for = "/*.zip"
  [headers.values]
    Content-Type = "application/zip"
    Content-Disposition = "attachment"
